<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading Portfolio</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{font-family:Arial,sans-serif;background:#050508;color:#d9faff;display:grid;place-items:center;overflow:hidden}
    body::before{content:"";position:fixed;inset:-20%;background:conic-gradient(from 120deg at 25% 40%,rgba(0,255,255,.1),transparent 40%,rgba(191,0,255,.08),transparent 78%),radial-gradient(circle at 75% 70%,rgba(0,229,160,.08),transparent 42%);filter:blur(24px);animation:spin 24s linear infinite}
    body::after{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(0,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,255,.04) 1px,transparent 1px);background-size:52px 52px;opacity:.5;pointer-events:none}
    .shell{position:relative;z-index:1;width:min(520px,92vw);padding:2rem 1.6rem;border:1px solid rgba(0,255,255,.18);border-radius:1.4rem;background:linear-gradient(180deg,rgba(8,12,20,.88),rgba(7,9,16,.94));box-shadow:0 20px 45px rgba(0,0,0,.35),0 0 0 1px rgba(0,255,255,.08) inset;text-align:center;animation:rise .9s ease}
    .shell::after{content:"";position:absolute;top:-120%;left:-38%;width:34%;height:320%;background:linear-gradient(120deg,transparent,rgba(255,255,255,.16),transparent);animation:sweep 1.35s ease .35s both}
    h1{font-size:clamp(1.4rem,4vw,2.2rem);letter-spacing:.18em;text-transform:uppercase;color:#f5fbff;margin-bottom:.9rem}
    p{font-size:.95rem;line-height:1.7;color:rgba(214,236,255,.78)}
    .loader{display:flex;justify-content:center;gap:.55rem;margin:1.3rem 0 1rem}
    .loader span{width:9px;height:9px;border-radius:50%;background:#00ffff;box-shadow:0 0 12px rgba(0,255,255,.45);animation:pulse 1.1s ease-in-out infinite}
    .loader span:nth-child(2){animation-delay:.16s}
    .loader span:nth-child(3){animation-delay:.32s}
    a{color:#9efbff}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    @keyframes rise{from{opacity:0;transform:translateY(28px) scale(.985);filter:blur(8px)}to{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}}
    @keyframes sweep{0%{transform:translateX(-170%) skewX(-18deg);opacity:0}20%{opacity:.4}100%{transform:translateX(260%) skewX(-18deg);opacity:0}}
    @keyframes pulse{0%,100%{transform:translateY(0);opacity:.45}50%{transform:translateY(-6px);opacity:1}}
  </style>
</head>
<body>
  <main class="shell">
    <h1>Portfolio Sync</h1>
    <p>Loading the main experience and routing you into the futuristic portfolio view.</p>
    <div class="loader" aria-hidden="true"><span></span><span></span><span></span></div>
    <p>If the redirect takes longer than expected, open <a href="sri.html">sri.html</a>.</p>
  </main>
  <script>
    window.setTimeout(function(){ window.location.replace('sri.html'); }, 700);
  </script>
</body>
</html>
